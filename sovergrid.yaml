# SoverGrid Configuration
# Generated by 'sovergrid init'
# Docs: https://github.com/sovergrid/sovergrid-cli

app:
  name: "sovergrid-cli"
  description: "My decentralized application"

compute:
  provider: "akash"
  region: "us-west"
  resources:
    cpu: 1
    memory: "512Mi"
    storage: "1Gi"

# Eco-Friendly Routing
# Set to 'true' to only use renewable energy compute providers
green: false

storage:
  provider: "filecoin"
  pin: true

build:
  dockerfile: "Dockerfile"
  port: 8080

payment:
  token: "USDC"
  max_budget: 15.00

database:
  provider: "kwil"
  name: "sovergrid_db"

frontend:
  provider: "4everland"
