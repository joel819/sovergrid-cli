# SoverGrid: Database Only
# Use this config if you ONLY want a decentralized database.
# No compute hosting. No file storage. Just a Web3-native database.
#
# Usage:
#   sovergrid db

app:
  name: "my-database"

database:
  provider: "kwil"         # Options: kwil (SQL), polybase (NoSQL)
  name: "users_db"         # Your database name
  schema: "./schema.sql"   # Path to your SQL schema file (optional)

payment:
  token: "USDC"
  max_budget: 5.00
