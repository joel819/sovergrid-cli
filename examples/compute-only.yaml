# SoverGrid: Compute Only
# Use this config if you ONLY want to deploy a containerized app
# to decentralized compute without using storage, ML, or CDN.
#
# Usage:
#   sovergrid deploy

app:
  name: "my-api-server"
  description: "A FastAPI backend running on decentralized compute"

green: true              # Only use providers powered by renewable energy

compute:
  provider: "akash"        # Options: akash, spheron, golem
  region: "us-west"        # Preferred region
  resources:
    cpu: 1                 # CPU cores
    memory: "512Mi"        # RAM allocation
    storage: "1Gi"         # Disk space

build:
  dockerfile: "Dockerfile" # Auto-generated by 'sovergrid init' if missing
  port: 8080               # Port your app listens on

payment:
  token: "USDC"
  max_budget: 5.00
